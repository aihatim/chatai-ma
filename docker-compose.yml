services:
  postgres:
    image: postgres:16-alpine
    container_name: chatai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatai
      POSTGRES_PASSWORD: chatai_local_dev
      POSTGRES_DB: chatai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chatai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatai-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: "postgresql://chatai:chatai_local_dev@postgres:5432/chatai?schema=public&pool_size=10"
      REDIS_URL: "redis://redis:6379"
      GROQ_API_KEY: "${GROQ_API_KEY:-placeholder}"
      GROQ_MODEL: "llama-3.3-70b-versatile"
      JWT_SECRET: "${JWT_SECRET:-placeholder}"
      JWT_EXPIRES_IN: "7d"
      NODE_ENV: "development"
      LOG_LEVEL: "debug"
      PORT: "4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
